server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - target_label: job
        replacement: docker
    pipeline_stages:
      - docker: {}
      - json:
          source: output
          expressions:
            service: service
            level: level
            context: context
            eventType: details.eventType
            action: details.action
            traceId: traceId
            requestId: requestId
      - labels:
          service:
          level:
          context:
          eventType:
          action:
